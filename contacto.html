<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#F9B937">
  <title>Contáctanos | Súmate a ReKrea</title>
  <meta name="description" content="Contacta a ReKrea por Instagram, TikTok, Facebook o WhatsApp y súmate al proyecto como voluntario o artista.">
  <meta property="og:title" content="Contáctanos | ReKrea">
  <meta property="og:description" content="Escríbenos y forma parte de ReKrea.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/img/contact/world.webp">
  <link rel="icon" href="assets/img/brand/logo-rekrea.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="contact">
  <div data-site-header></div>

  <main class="contact-main" id="contenido">
    <div class="container contact-grid">
      <section class="contact-content" aria-labelledby="contact-title">
        <h1 id="contact-title">Contáctanos</h1>
        <p class="contact-content__lead">¿Quieres conocer o sumarte al proyecto? Escríbenos y forma parte de ReKrea.</p>
        <div data-social-links data-social-class="social-links social-links--large"></div>
        <p class="contact-content__alternate">O también puedes:</p>
        <div class="contact-actions">
          <article class="contact-action-card" data-reveal>
            <p>Completar el formulario y súmate al proyecto.</p>
            <a class="button button--primary" href="https://docs.google.com/forms/d/e/1FAIpQLScEYhL4VMKrsJV8Pbt_Q7vHS6Wk6JeTPR7oO3VU-YznD_Z_xQ/viewform?usp=header" target="_blank" rel="noopener noreferrer" data-link="volunteers">Formulario</a>
          </article>
          <article class="contact-action-card" data-reveal data-reveal-delay="90">
            <p>Luego escríbenos por WhatsApp y resolveremos tus dudas.</p>
            <a class="button button--green" href="https://wa.me/qr/MBHIIN5NL7MCE1" target="_blank" rel="noopener noreferrer" data-link="whatsapp">Escríbenos</a>
          </article>
        </div>
      </section>

      <div class="contact-composition" aria-hidden="true">
        <img class="contact-composition__head" src="assets/img/contact/head-collage.webp" alt="">
        <img class="contact-composition__city" src="assets/img/contact/city-collage.webp" alt="">
        <img class="contact-composition__world" src="assets/img/contact/world.webp" alt="">
      </div>
    </div>
  </main>

  <div data-site-footer></div>
  <script src="assets/js/data.js" defer></script>
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
